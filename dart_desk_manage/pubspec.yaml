name: dart_desk_manage
description: Dart Desk Manage — Project management dashboard
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  shadcn_ui: ^0.52.1
  zenrouter: ^2.0.3
  signals: ^6.0.2
  dart_desk_be_client:
    path: ../dart_desk_be_client
  serverpod_flutter: 3.4.3
  serverpod_auth_idp_flutter: 3.4.3
  lucide_icons_flutter: ^3.1.0
  intl: any
  flutter_web_plugins:
    sdk: flutter
  url_launcher: ^6.2.0
  marionette_flutter:
    path: ../../../marionette_mcp/packages/marionette_flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: '>=3.0.0 <7.0.0'
  marionette_mcp: 
    path: ../../../marionette_mcp/packages/marionette_mcp

dependency_overrides:
  signals:
    git:
      url: https://github.com/rodydavis/signals.dart.git
      path: packages/signals
  signals_core:
    git:
      url: https://github.com/rodydavis/signals.dart.git
      path: packages/signals_core
  signals_flutter:
    git:
      url: https://github.com/rodydavis/signals.dart.git
      path: packages/signals_flutter

flutter:
  uses-material-design: true
