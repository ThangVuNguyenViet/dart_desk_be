# Template production configuration — customize for your deployment.
# Copy this file and replace placeholder values with your actual settings.

# Configuration for the main API server.
apiServer:
  port: 8080
  publicHost: api.example.com
  publicPort: 443
  publicScheme: https

# Configuration for the Insights server.
insightsServer:
  port: 8081
  publicHost: insights.example.com
  publicPort: 443
  publicScheme: https

# Configuration for the web server.
webServer:
  port: 8082
  publicHost: app.example.com
  publicPort: 443
  publicScheme: https

# Database configuration.
database:
  host: localhost
  port: 5432
  name: serverpod
  user: postgres
  requireSsl: false
  #isUnixSocket: true # defaults to false

# Redis configuration.
redis:
  enabled: false
  host: localhost
  port: 6379
  #user: # defaults to empty
  #requireSsl: true # defaults to false

maxRequestSize: 10485760 # The maximum size of requests allowed in bytes (10MB for file uploads)

# Storage configuration for file uploads.
# For cloud storage (S3, GCS, R2), configure via a plugin or deployment overlay.
storage:
  public:
    type: local
    path: storage/public
    publicUrl: https://storage.example.com

sessionLogs:
  consoleEnabled: false
# persistentEnabled: true
# consoleLogFormat: json # Defaults to "json", options are "text" or "json"

# futureCallExecutionEnabled: true # Defaults to true

#futureCall:
#  concurrencyLimit: 1 # Defaults to 1, a negative or null value removes the limit
#  scanInterval: 5000 # Unit in milliseconds, defaults to 5000
