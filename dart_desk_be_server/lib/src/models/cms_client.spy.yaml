class: CmsClient
table: cms_clients
fields:
  name: String
  slug: String
  apiTokenHash: String
  description: String?
  isActive: bool, default=true
  apiTokenPrefix: String?
  lastUsedAt: DateTime?
  settings: String?
  createdAt: DateTime?, default=now
  updatedAt: DateTime?, default=now
indexes:
  cms_clients_slug_idx:
    fields: slug
    unique: true
  cms_clients_is_active_idx:
    fields: isActive
