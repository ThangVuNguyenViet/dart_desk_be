class: MediaFile
table: media_files
fields:
  clientId: int, relation(parent=cms_clients, onDelete=Restrict)
  fileName: String
  fileType: String
  fileSize: int
  storagePath: String
  publicUrl: String
  altText: String?
  metadata: String?
  uploadedByUserId: int, relation(parent=cms_users, onDelete=SetNull)
  createdAt: DateTime?, default=now
indexes:
  media_files_client_id_idx:
    fields: clientId
  media_files_uploaded_by_idx:
    fields: uploadedByUserId
  media_files_created_at_idx:
    fields: createdAt
  media_files_file_type_idx:
    fields: fileType
