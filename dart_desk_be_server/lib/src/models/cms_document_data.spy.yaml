class: DocumentData
table: documents_data
fields:
  documentType: String
  data: String  # JSON string for flexible document data
  createdAt: DateTime?, default=now
  updatedAt: DateTime?, default=now
  createdByUserId: int?
  updatedByUserId: int?
indexes:
  documents_data_document_type_idx:
    fields: documentType
  documents_data_created_at_idx:
    fields: createdAt
  documents_data_updated_at_idx:
    fields: updatedAt
