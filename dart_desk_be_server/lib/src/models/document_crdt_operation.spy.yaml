class: DocumentCrdtOperation
table: document_crdt_operations
fields:
  documentId: int, relation(parent=cms_documents, onDelete=Cascade)
  hlc: String  # Hybrid Logical Clock (sortable, unique)
  nodeId: String  # Node that created operation
  operationType: CrdtOperationType
  fieldPath: String  # Dot-notation path (e.g., "metadata.author")
  fieldValue: String?  # JSON-encoded value (null for deletes)
  createdAt: DateTime?, default=now
  createdByUserId: int?, relation(parent=cms_users, onDelete=SetNull)
indexes:
  document_crdt_operations_document_hlc_idx:
    fields: documentId, hlc
  document_crdt_operations_document_id_idx:
    fields: documentId
  document_crdt_operations_created_at_idx:
    fields: createdAt
