class: ApiToken
table: api_tokens
fields:
  tenantId: int?
  name: String
  tokenHash: String
  tokenPrefix: String
  tokenSuffix: String
  role: String
  createdByUserId: int?, relation(parent=users, onDelete=SetNull)
  lastUsedAt: DateTime?
  expiresAt: DateTime?
  isActive: bool, default=true
  createdAt: DateTime?, default=now
indexes:
  api_token_tenant_idx:
    fields: tenantId
  api_token_lookup_idx:
    fields: tenantId, tokenPrefix, tokenSuffix
    unique: true
