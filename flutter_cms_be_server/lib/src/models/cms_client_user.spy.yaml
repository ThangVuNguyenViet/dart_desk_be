class: CmsClientUser
table: cms_client_users
fields:
  clientId: int, relation(parent=cms_clients, onDelete=Cascade)
  cmsUserId: int, relation(parent=cms_users, onDelete=Cascade)
  role: String
  isActive: bool, default=true
  createdAt: DateTime?, default=now
  updatedAt: DateTime?, default=now
indexes:
  cms_client_users_client_user_idx:
    fields: clientId, cmsUserId
    unique: true
  cms_client_users_client_id_idx:
    fields: clientId
  cms_client_users_cms_user_id_idx:
    fields: cmsUserId
