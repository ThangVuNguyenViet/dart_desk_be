class: Document
table: documents
fields:
  clientId: int, relation(parent=cms_clients, onDelete=Restrict)
  documentType: String
  title: String
  slug: String?
  currentVersionId: int?
  createdAt: DateTime?, default=now
  updatedAt: DateTime?, default=now
  createdByUserId: int, relation(parent=cms_users, onDelete=SetNull)
  updatedByUserId: int?, relation(parent=cms_users, onDelete=SetNull)
indexes:
  documents_client_id_idx:
    fields: clientId
  documents_document_type_idx:
    fields: documentType
  documents_client_type_idx:
    fields: clientId, documentType
  documents_current_version_idx:
    fields: currentVersionId
  documents_created_at_idx:
    fields: createdAt
  documents_updated_at_idx:
    fields: updatedAt
