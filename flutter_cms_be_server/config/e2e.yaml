# E2E testing server configuration.
# Uses the test database but with a fixed port for real HTTP connections.

apiServer:
  port: 8080
  publicHost: localhost
  publicPort: 8080
  publicScheme: http

insightsServer:
  port: 8081
  publicHost: localhost
  publicPort: 8081
  publicScheme: http

webServer:
  port: 8082
  publicHost: localhost
  publicPort: 8082
  publicScheme: http

database:
  host: localhost
  port: 9090
  name: flutter_cms_be_test
  user: postgres

redis:
  enabled: false
  host: localhost
  port: 9091

sessionLogs:
  persistentEnabled: false
  consoleEnabled: true
