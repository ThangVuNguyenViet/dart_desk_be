# Template staging configuration — customize for your deployment.
# Copy this file and replace placeholder values with your actual settings.

# Configuration for the main API server.
apiServer:
  port: 8080
  publicHost: api-staging.example.com
  publicPort: 443
  publicScheme: https

# Configuration for the Insights server.
insightsServer:
  port: 8081
  publicHost: insights-staging.example.com
  publicPort: 443
  publicScheme: https

# Configuration for the web server.
webServer:
  port: 8082
  publicHost: app-staging.example.com
  publicPort: 443
  publicScheme: https

# Database configuration.
database:
  host: localhost
  port: 5432
  name: serverpod
  user: postgres
  requireSsl: false

# Redis configuration.
redis:
  enabled: false
  host: localhost
  port: 6379

maxRequestSize: 524288

sessionLogs:
  consoleEnabled: false
